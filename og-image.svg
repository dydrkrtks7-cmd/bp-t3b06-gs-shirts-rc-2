<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="907" cy="548" r="59" fill="#16213e" opacity="0.15"/>
    <circle cx="1020" cy="-82" r="73" fill="#16213e" opacity="0.05"/>
    <circle cx="397" cy="164" r="76" fill="#16213e" opacity="0.09"/>
    <circle cx="673" cy="498" r="27" fill="#16213e" opacity="0.12"/>
    <circle cx="602" cy="-7" r="55" fill="#16213e" opacity="0.08"/>
    <circle cx="824" cy="689" r="42" fill="#16213e" opacity="0.13"/>
    <rect x="694" y="0" width="34" height="37" rx="8" fill="#1a1a2e" opacity="0.12" transform="rotate(8, -92, 694)"/>
    <rect x="187" y="-30" width="75" height="87" rx="8" fill="#1a1a2e" opacity="0.08" transform="rotate(15, 815, -22)"/>
    <rect x="842" y="378" width="91" height="36" rx="8" fill="#1a1a2e" opacity="0.04" transform="rotate(36, 899, 293)"/>
    <rect x="377" y="199" width="57" height="87" rx="8" fill="#1a1a2e" opacity="0.09" transform="rotate(10, 1223, 130)"/>
    <rect x="986" y="-73" width="80" height="28" rx="8" fill="#1a1a2e" opacity="0.08" transform="rotate(20, 199, -71)"/>
    <rect x="519" y="262" width="41" height="34" rx="8" fill="#1a1a2e" opacity="0.15" transform="rotate(31, 366, -54)"/>
    <rect x="813" y="464" width="24" height="32" rx="8" fill="#1a1a2e" opacity="0.07" transform="rotate(32, 112, 18)"/>
    <rect x="732" y="397" width="41" height="38" rx="8" fill="#1a1a2e" opacity="0.03" transform="rotate(18, 489, 97)"/>
    <polygon points="963,619 990,673 936,673" fill="#16213e" opacity="0.09"/>
    <polygon points="318,-122 344,-70 292,-70" fill="#16213e" opacity="0.11"/>
    <polygon points="1128,515 1171,601 1085,601" fill="#16213e" opacity="0.03"/>
    <polygon points="908,576 982,724 834,724" fill="#16213e" opacity="0.12"/>

  <!-- Wave at bottom -->
  <path d="M0,534 C360,582 840,486 1200,534 L1200,630 L0,630Z" fill="#16213e" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    강서 셔츠룸 추천
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    강서 — 셔츠룸
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#e94560" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#e94560" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    강서 강서 셔츠룸 추천 — 셔츠룸
  </text>
</svg>